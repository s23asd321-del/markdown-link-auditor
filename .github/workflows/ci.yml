name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install -e ".[dev]"
      - run: python -m pytest
      - run: python -m markdown_link_auditor.cli check .
      - run: python -m markdown_link_auditor.cli check examples/good-docs
      - run: python -m markdown_link_auditor.cli check examples/good-docs --format json
      - name: Confirm bad docs fail as expected
        run: |
          set +e
          python -m markdown_link_auditor.cli check examples/bad-docs
          status=$?
          set -e
          test "$status" -eq 1
